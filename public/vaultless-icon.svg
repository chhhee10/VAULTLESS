<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- White highlight gradient for the glossy top reflection -->
    <linearGradient id="edgeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Main thick hollow outline (solid color to prevent looking crooked) -->
  <polygon points="92,50 71,86.373 29,86.373 8,50 29,13.627 71,13.627" 
           fill="none" stroke="#00FF4D" stroke-width="14" stroke-linejoin="miter" />
           
  <!-- Glossy specular reflection overlay -->
  <polygon points="92,50 71,86.373 29,86.373 8,50 29,13.627 71,13.627" 
           fill="none" stroke="url(#edgeHighlight)" stroke-width="6" stroke-linejoin="miter" />
</svg>
